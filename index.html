<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Playground</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>
  <div id="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
          </svg>
          Chat Playground
        </h1>
        <button class="btn btn-icon" id="theme-toggle-btn" title="Toggle theme">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            id="theme-icon">
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
        </button>
      </div>
      <div class="sidebar-content">
        <details class="section-accordion" id="model-config" open>
          <summary class="section-title"><i class="ri-settings-3-line"></i> Model Configuration</summary>
          <div class="section-content">
            <div class="form-group">
              <label for="model-name">Model Name</label>
              <div style="display: flex; gap: 8px;">
                <input type="text" id="model-name" placeholder="@google/gemini-2.0-flash" />
                <button class="btn btn-secondary btn-icon" style="height: 28px;" id="list-models-btn" title="List Models">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" />
                  </svg>
                </button>
              </div>
            </div>
            <div class="form-group">
              <label for="endpoint">Endpoint URL</label>
              <input type="text" id="endpoint" placeholder="https://api.openai.com/v1/chat/completions" />
            </div>
            <div class="form-group">
              <label for="api-key">API Key</label>
              <input type="password" id="api-key" placeholder="sk-..." />
            </div>
            <button class="btn btn-secondary" id="providers-btn" style="width: 100%;">
              <i class="ri-database-2-line"></i>
              Manage Providers
            </button>
          </div>
        </details>

        <details class="section-accordion" id="inference-config" open>
          <summary class="section-title"><i class="ri-message-3-line"></i> System Prompt</summary>
          <div class="section-content">
            <div class="form-group" style="margin-bottom: 0;">
              <textarea id="system-prompt" placeholder="Describe desired model behavior..."></textarea>
            </div>
          </div>
        </details>

        <details class="section-accordion">
          <summary class="section-title"><i class="ri-equalizer-line"></i> Sampling</summary>
          <div class="section-content">
            <div class="form-group">
              <div class="param-row">
                <label>Temperature</label>
                <div class="checkbox-inline">
                  <input type="checkbox" id="temp-enabled" checked />
                </div>
              </div>
              <div class="range-group">
                <input type="range" id="temperature" min="0" max="2" step="0.1" value="1" />
                <span class="range-value" id="temp-value">1.0</span>
              </div>
            </div>
            <div class="form-group">
              <label for="top-k">Top K <span class="hint-text">(0 = off)</span></label>
              <div class="range-group">
                <input type="range" id="top-k" min="0" max="100" step="1" value="0" />
                <span class="range-value" id="top-k-value">0</span>
              </div>
            </div>
            <div class="form-group" style="margin-bottom: 0;">
              <label for="top-p">Top P <span class="hint-text">(0 = off)</span></label>
              <div class="range-group">
                <input type="range" id="top-p" min="0" max="1" step="0.01" value="0" />
                <span class="range-value" id="top-p-value">0.00</span>
              </div>
            </div>
          </div>
        </details>

        <details class="section-accordion">
          <summary class="section-title"><i class="ri-sparkling-line"></i> Generation</summary>
          <div class="section-content">
            <div class="form-group">
              <label for="max-tokens">Max Tokens</label>
              <input type="number" id="max-tokens" placeholder="Default" min="1" />
            </div>
            <div class="form-group">
              <label for="reasoning-effort">Reasoning Effort</label>
              <select id="reasoning-effort">
                <option value="null">Default</option>
                <option value="none">None</option>
                <option value="minimal">Minimal</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
                <option value="xhigh">Extra High</option>
              </select>
            </div>
            <div class="form-group" style="margin-bottom: 0;">
              <label for="stop-sequences">Stop Sequences <span class="hint-text">(one per line)</span></label>
              <textarea id="stop-sequences" rows="2" placeholder="###&#10;[END]"></textarea>
            </div>
          </div>
        </details>

        <details class="section-accordion">
          <summary class="section-title"><i class="ri-tools-line"></i> Tools</summary>
          <div class="section-content">
            <div class="form-group" style="margin-bottom: 0;">
              <textarea id="tools" class="json-editor" placeholder='[{"type": "function", "function": {...}}]'></textarea>
              <div class="hint-buttons">
                <button type="button" class="hint-btn" data-tool="weather" title="Weather tool example">Weather</button>
                <button type="button" class="hint-btn" data-tool="calculator" title="Calculator tool example">Calculator</button>
                <button type="button" class="hint-btn" data-tool="websearch" title="Web search tool example">Web Search</button>
              </div>
            </div>
          </div>
        </details>

        <div class="section">
          <button class="btn btn-secondary" id="reset-params-btn" style="width: 100%; margin-bottom: 8px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" />
              <path d="M21 3v5h-5" />
              <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" />
              <path d="M3 21v-5h5" />
            </svg>
            Reset Parameters
          </button>
          <button class="btn btn-secondary" id="clear-chat" style="width: 100%;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
            </svg>
            Clear Chat
          </button>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="status-bar">
        <div class="status-indicator">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">Ready</span>
        </div>
        <span id="model-display">No model configured</span>
      </div>

      <div class="tabs-bar">
        <div class="tabs-container" id="tabs-container"></div>
        <button class="btn btn-icon tab-add-btn" id="add-tab-btn" title="New chat">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14" />
          </svg>
        </button>
      </div>

      <div class="chat-container">
        <div class="messages" id="messages">
          <div class="empty-state" id="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
            </svg>
            <p>Your conversation will appear here</p>
          </div>
        </div>

        <div class="input-area">
          <div class="input-container">
            <div class="input-attachments" id="input-attachments"></div>
            <div class="input-row">
              <textarea id="user-input" placeholder="Chat with your prompt..." rows="1"></textarea>
              <div class="input-actions">
                <button class="btn btn-icon" id="attach-btn" title="Attach file">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path
                      d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" />
                  </svg>
                </button>
                <button class="btn btn-primary" id="send-btn">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" />
                  </svg>
                  Send
                </button>
                <button class="btn btn-danger" id="stop-btn" style="display: none;">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="6" y="6" width="12" height="12" />
                  </svg>
                  Stop
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <input type="file" id="file-input" multiple accept="image/*,audio/*,.pdf,.txt,.md,.json" style="display: none;" />

  <div class="modal-overlay" id="tool-modal" style="display: none;">
    <div class="modal">
      <div class="modal-title">Provide Tool Response</div>
      <div class="form-group">
        <label id="tool-modal-name">Function: </label>
      </div>
      <div class="form-group">
        <label for="tool-response">Response (JSON or text)</label>
        <textarea id="tool-response" class="json-editor" rows="8"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="tool-modal-cancel">Cancel</button>
        <button class="btn btn-primary" id="tool-modal-submit">Submit</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="edit-modal" style="display: none;">
    <div class="modal">
      <div class="modal-title">Edit Message</div>
      <div class="form-group">
        <label for="edit-content">Content</label>
        <textarea id="edit-content" rows="6"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="edit-modal-cancel">Cancel</button>
        <button class="btn btn-primary" id="edit-modal-submit">Save & Regenerate</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="models-modal" style="display: none;">
    <div class="modal" style="max-height: 80vh;">
      <div class="modal-title">Select Model</div>
      <div class="models-list" id="models-list">
        <div class="loading-indicator">Loading models...</div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="models-modal-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="providers-modal" style="display: none;">
    <div class="modal" style="max-height: 80vh; width: 500px;">
      <div class="modal-title">Manage Providers</div>
      <div class="providers-list" id="providers-list"></div>
      <div class="provider-form" id="provider-form">
        <div class="form-group">
          <label for="provider-name">Provider Name</label>
          <input type="text" id="provider-name" placeholder="My OpenAI Provider" />
        </div>
        <div class="form-group">
          <label for="provider-endpoint">Endpoint URL</label>
          <input type="text" id="provider-endpoint" placeholder="https://api.openai.com/v1/chat/completions" />
          <div class="hint-buttons">
            <button type="button" class="hint-btn" data-endpoint="https://api.openai.com/v1/chat/completions" data-target="provider-endpoint" title="OpenAI">OpenAI</button>
            <button type="button" class="hint-btn" data-endpoint="https://generativelanguage.googleapis.com/v1beta/models" data-target="provider-endpoint" title="Google">Google</button>
            <button type="button" class="hint-btn" data-endpoint="https://api.anthropic.com/v1/messages" data-target="provider-endpoint" title="Anthropic">Anthropic</button>
            <button type="button" class="hint-btn" data-endpoint="https://openrouter.ai/api/v1/chat/completions" data-target="provider-endpoint" title="OpenRouter">OpenRouter</button>
            <button type="button" class="hint-btn" data-endpoint="https://api-inference.huggingface.co/models" data-target="provider-endpoint" title="HuggingFace">HuggingFace</button>
            <button type="button" class="hint-btn" data-endpoint="https://api.groq.com/openai/v1/chat/completions" data-target="provider-endpoint" title="Groq">Groq</button>
            <button type="button" class="hint-btn" data-endpoint="https://api.cerebras.ai/v1/chat/completions" data-target="provider-endpoint" title="Cerebras">Cerebras</button>
            <button type="button" class="hint-btn" data-endpoint="https://api.studio.nebius.ai/v1/chat/completions" data-target="provider-endpoint" title="Nebius">Nebius</button>
            <button type="button" class="hint-btn" data-endpoint="https://inference.aivax.net/v1/chat/completions" data-target="provider-endpoint" title="AIVAX">AIVAX</button>
          </div>
        </div>
        <div class="form-group">
          <label for="provider-model">Model Name</label>
          <input type="text" id="provider-model" placeholder="gpt-4o" />
        </div>
        <div class="form-group">
          <label for="provider-apikey">API Key</label>
          <input type="password" id="provider-apikey" placeholder="sk-..." />
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="providers-modal-cancel">Close</button>
        <button class="btn btn-primary" id="provider-save-btn">
          <i class="ri-add-line"></i>
          Add Provider
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
